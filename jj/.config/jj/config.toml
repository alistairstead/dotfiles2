#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Alistair Stead"
email = "62936+alistairstead@users.noreply.github.com"

[signing]
behavior = "own"
backend = "ssh"
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICqsrSxLYhMuCdzuO6pra5QulC8SKN19v1AUjh7wqUZq"

[signing.backends.ssh]
program = "/Applications/1Password.app/Contents/MacOS/op-ssh-sign"

[git]
sign-on-push = true

[remotes.origin]
auto-track-bookmarks = "glob:*"

[remotes.upstream]
auto-track-bookmarks = "main"

[revset-aliases]
'trunk()' = 'latest(remote_bookmarks(exact:"main", exact:"origin"))'
'mine()' = "mutable() & mine()"
'stack()' = "trunk()..@"

[aliases]
l = ["log", "-r", "trunk()..@ | ancestors(trunk(), 15)"]
la = ["log", "-r", "all()"]
sync = ["rebase", "-d", "main"]
tidy = ["git", "push", "-b", "glob:feat/*", "-b", "glob:fix/*"]
claude-snapshot = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
  set -euo pipefail
  is_empty=$(jj show @ -T 'self.empty()' --no-pager)
  if [ "$is_empty" = "true" ]; then
    echo "No changes to snapshot"
    exit 0
  fi
  # Trigger operation recording with jj status
  jj status > /dev/null
  op_id=$(jj op log --no-pager -T 'id.short()' --limit 1)
  echo "Snapshot: operation $op_id"
  echo "Use 'jj op log' to view history and 'jj op restore --to $op_id' to restore if needed."
""",
  ""
]

[fix.tools.biome]
command = [
  "bunx",
  "@biomejs/biome",
  "check",
  "--stdin-file-path=$path",
  "--write"
]

patterns = [
  "glob:'**/*.js'",
  "glob:'**/*.jsx'",
  "glob:'**/*.ts'",
  "glob:'**/*.tsx'",
  "glob:'**/*.json'",
]

